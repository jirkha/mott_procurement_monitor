# Volitelné: lokální PostgreSQL (výchozí vývoj je SQLite v packages/db/.env — file:./dev.db).
# docker compose up -d  →  DATABASE_URL="postgresql://mott:mott@localhost:5432/mott_dev?schema=public"
# + PRISMA_SCHEMA_TARGET=postgres u prisma generate, pokud chcete stejný engine jako na Vercelu.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mott
      POSTGRES_PASSWORD: mott
      POSTGRES_DB: mott_dev
    ports:
      - "5432:5432"
